name: Update Metal Prices

on:
  schedule:
    # Every day at 06:00 UTC (11:30 AM IST)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Manual trigger from the GitHub Actions tab

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch metal prices
        run: python3 tools/fetch_metal_prices.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/metal-prices.json
          git diff --cached --quiet || git commit -m "chore: update metal prices [$(date -u +'%Y-%m-%d')]"
          git push

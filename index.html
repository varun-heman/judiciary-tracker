<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>India Judiciary & Ministry Tracker</title>
  <meta name="description" content="Track sitting judges of India's Supreme Court and 25 High Courts, plus key Ministry officials. Data sourced from sci.gov.in and doj.gov.in.">
  <!-- Open Graph / social sharing thumbnail -->
  <meta property="og:type"        content="website">
  <meta property="og:title"       content="India Judiciary & Ministry Tracker">
  <meta property="og:description" content="Track sitting judges of India's Supreme Court and 25 High Courts, plus key Ministry officials.">
  <meta property="og:image"       content="assets/thumbnail.png">
  <meta property="og:image:width"  content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card"       content="summary_large_image">
  <meta name="twitter:title"      content="India Judiciary & Ministry Tracker">
  <meta name="twitter:description" content="Track sitting judges of India's Supreme Court and 25 High Courts, plus key Ministry officials.">
  <meta name="twitter:image"      content="assets/thumbnail.png">
  <!-- Favicons -->
  <link rel="icon" type="image/png" sizes="32x32"  href="assets/icon.png">
  <link rel="icon" type="image/png" sizes="16x16"  href="assets/icon.png">
  <link rel="apple-touch-icon"                      href="assets/icon.png">
  <meta name="msapplication-TileImage"             content="assets/icon.png">
  <link rel="stylesheet" href="css/styles.css?v=20260514-17">
</head>
<body>

<div class="app-layout">

  <!-- ── Sidebar ── -->
  <div class="sidebar-backdrop" id="sidebar-backdrop" aria-hidden="true"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <button class="sidebar-close-btn" id="sidebar-close" aria-label="Close menu">×</button>
      <div class="logo" role="button" tabindex="0" onclick="selectHome()" onkeydown="if(event.key === 'Enter' || event.key === ' ') { event.preventDefault(); selectHome(); }">
        <img class="logo-icon-img" src="assets/icon.png" alt="Judiciary Tracker icon">
        <div>
          <div class="logo-title">Judiciary Tracker</div>
          <div class="logo-sub">by <a href="https://pvt.is" target="_blank" rel="noopener" class="logo-author" onclick="event.stopPropagation()">Varun Hemachandran</a></div>
        </div>
      </div>
      <div class="search-box">
        <input
          type="text"
          id="search-input"
          placeholder="Search judges, courts, roles…"
          autocomplete="off"
          spellcheck="false"
        >
      </div>
    </div>

    <nav id="nav-list" class="nav-list">
      <!-- Populated by app.js -->
      <div class="loading" style="padding: 20px; font-size: 12px; color: var(--text-sidebar-muted);">Loading…</div>
    </nav>
  </aside>

  <!-- ── Main Panel ── -->
  <main class="main-panel" id="main-panel">
    <header class="top-bar">
      <button class="menu-toggle-btn" id="menu-toggle" aria-label="Toggle sidebar">☰</button>
      <div class="data-notice">
        <span class="notice-sources">📊 Data: <a href="https://www.sci.gov.in/chief-justice-judges/" target="_blank" rel="noopener">sci.gov.in</a>
        &amp; <a href="https://doj.gov.in/list-of-supreme-court-and-high-courts-judges/" target="_blank" rel="noopener">doj.gov.in</a>
        &amp; <a href="https://lawmin.gov.in/about-us/whos-who" target="_blank" rel="noopener">lawmin.gov.in</a></span>
        <span class="notice-verified">Last verified <strong>May 2026</strong></span>
        <span class="notice-disclaimer">No guarantee of accuracy; data is AI parsed and not human verified.</span>
        <a class="notice-about" href="about.html">About</a>
        <a class="notice-notifications" href="notifications.html">Judge/Staff Transfer Notifications</a>
      </div>
      <button id="theme-toggle" class="theme-btn" title="Toggle dark mode">🌙</button>
    </header>

    <div id="main-content" class="content-area">
      <div class="loading">Loading judiciary data…</div>
    </div>
  </main>

  <!-- ── Upcoming Retirements Panel ── -->
  <aside class="upcoming-panel" id="upcoming-outer">
    <div class="upcoming-title">
      <span>⏳ Upcoming Retirements</span>
      <button class="right-rail-toggle" id="right-rail-toggle" type="button" aria-label="Collapse right panel" aria-expanded="true">›</button>
    </div>
    <div class="upcoming-scroll" id="upcoming-panel">
      <div class="upcoming-empty">Loading…</div>
    </div>
  </aside>

</div>

<script src="data/data.js?v=20260514-6"></script>
<script src="js/app.js?v=20260514-16"></script>
</body>
</html>
